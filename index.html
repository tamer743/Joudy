<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Jody Only</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Noto+Kufi+Arabic:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: radial-gradient(circle, #330000 0%, #000000 100%); color: #fff; font-family: 'Noto Kufi Arabic', sans-serif; }
        
        .main-card { 
            background: rgba(0, 0, 0, 0.85); padding: 25px; border-radius: 25px; 
            border: 2px solid #ff0000; box-shadow: 0 0 25px rgba(255, 0, 0, 0.5); 
            width: 90%; max-width: 580px; 
            display: flex; gap: 25px; align-items: center;
        }

        .left-side { flex: 1; }
        
        /* الصورة كبرت شوية لـ 140px */
        .right-side { flex: 0 0 140px; position: relative; }
        .cover-box { width: 140px; height: 140px; border-radius: 15px; border: 2px solid #ff4d4d; object-fit: cover; transition: opacity 0.5s ease-in-out; }

        .title { font-family: 'Dancing Script', cursive; font-size: 1.6rem; color: #ff4d4d; margin-bottom: 5px; }
        .message-jody { font-size: 0.85rem; margin-bottom: 8px; line-height: 1.4; color: #eee; }
        .song-name { font-size: 0.75rem; color: #ff4d4d; margin-bottom: 12px; font-weight: bold; }

        .lyrics { height: 60px; overflow: hidden; margin: 10px 0; font-size: 0.85rem; position: relative; }
        .line { opacity: 0; transition: 0.4s; position: absolute; width: 100%; margin: 0; }
        .active { opacity: 1; transform: scale(1.02); text-shadow: 0 0 4px #ff4d4d; }

        .play-btn { background: transparent; border: 1.5px solid #ff4d4d; color: #ff4d4d; padding: 5px 18px; font-weight: bold; border-radius: 20px; cursor: pointer; transition: 0.3s; font-family: 'Dancing Script', cursive; font-size: 0.9rem; }
        .play-btn:hover { background: #ff4d4d; color: #000; }
    </style>
</head>
<body>

    <div class="main-card">
        <div class="left-side">
            <div class="title">To Jody...</div>
            <div class="message-jody">إنتي الأهم منهم كلهم.. وإنتي اللي أنا عايزه من الكون ده كله</div>
            <div class="song-name">James Dean - أمير عيد</div>
            
            <div class="lyrics" id="lyrics-box">
                <p class="line" data-time="1">أنا وهي عايشين في فيلم السيما</p>
                <p class="line" data-time="5">الصورة الـ retro والألوان جميلة</p>
                <p class="line" data-time="9">متمردين ع الفاضي بدون قضية</p>
                <p class="line" data-time="13">بندوس بنزين جامد عشان نهرب من الدنيا ديه</p>
                <p class="line" data-time="17">معاكي بنسى أنا مين.. بحس إني James Dean</p>
            </div>
            <button class="play-btn" onclick="togglePlay()">Play Our Vibe</button>
        </div>

        <div class="right-side">
            <img id="dynamic-cover" src="1.jpg" class="cover-box" alt="Cover">
        </div>

        <audio id="mySong"><source src="song.mp3" type="audio/mpeg"></audio>
    </div>

    <script>
        const images = ["1.jpg", "2.jpg", "3.jpg", "4.jpg", "5.jpg"];
        let index = 0;
        const imgElement = document.getElementById("dynamic-cover");

        setInterval(() => {
            index = (index + 1) % images.length;
            imgElement.style.opacity = 0;
            setTimeout(() => {
                imgElement.src = images[index];
                imgElement.style.opacity = 1;
            }, 500);
        }, 3000);

        var song = document.getElementById("mySong");
        var lines = document.querySelectorAll(".line");
        function togglePlay() { song.paused ? song.play() : song.pause(); }
        song.addEventListener("timeupdate", () => {
            lines.forEach(line => {
                if (song.currentTime >= line.dataset.time) {
                    lines.forEach(l => l.classList.remove("active"));
                    line.classList.add("active");
                }
            });
        });
    </script>
</body>
</html>
